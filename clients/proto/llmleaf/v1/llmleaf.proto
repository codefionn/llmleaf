// llmleaf client contract — the single source of truth for every official client
// library under clients/ (Kotlin Multiplatform, Go, Rust, TypeScript, Zig).
//
// SOUL.md: "Official consumer client libraries live in clients/ ... generated from a
// single Protocol Buffers schema ... the source of truth for the canonical
// request/response shapes the libraries expose ... on the wire the libraries still
// speak llmleaf's existing OpenAI/OpenRouter HTTP surface (P3)."
//
// THE WIRE IS JSON, NOT PROTOBUF-BINARY. These messages are the typed model each
// SDK exposes; every client's HTTP transport serialises them to / parses them from
// the OpenAI/OpenRouter-shaped JSON the core actually speaks. Two conventions make
// that mapping mechanical and identical in every language:
//
//   1. Field names are snake_case and already match the JSON keys on the wire.
//   2. Closed-set enums map to their wire token by LOWERCASING the enum value name:
//        FinishReason.TOOL_CALLS  <-> "tool_calls"
//        Role.ASSISTANT           <-> "assistant"
//        BatchStatus.IN_PROGRESS  <-> "in_progress"
//      The `*_UNSPECIFIED` zero value means the field is absent on the wire.
//
// Free-form JSON (arbitrary tool parameters, response_format bodies, provider
// passthrough) is carried as a raw-JSON `string` rather than google.protobuf.Struct,
// so codegen needs no well-known-type support in any target language. The transport
// splices these strings into the request body verbatim (P7 — transparent passthrough).

syntax = "proto3";

package llmleaf.v1;

option go_package = "github.com/codefionn/llmleaf/clients/go/llmleafpb;llmleafpb";
option java_package = "eu.codefionn.llmleaf.v1";
option java_multiple_files = true;

// ----------------------------------------------------------------------------
// Common
// ----------------------------------------------------------------------------

// Token accounting echoed on every response. `cost_usd` is an llmleaf addition
// (real-time price from the bundled pricing dataset); it is null/absent when the
// model has no known price.
message Usage {
  uint32 prompt_tokens = 1;
  uint32 completion_tokens = 2;
  uint32 total_tokens = 3;
  optional double cost_usd = 4;
  // Prompt-cache hit accounting, OpenAI-shaped (`usage.prompt_tokens_details`). Absent when the
  // upstream reported no caching. `cached_tokens` is how many of `prompt_tokens` were a cache *read*.
  optional PromptTokensDetails prompt_tokens_details = 5;
  // Input tokens written to the provider's prompt cache this request — a cache *write* (creation).
  // An llmleaf extension (Anthropic reports it; OpenAI/OpenRouter do not), absent/0 when there was none.
  optional uint32 cache_creation_tokens = 6;
}

// Breakdown of `Usage.prompt_tokens`. Today only the cached (cache-read / hit) share is surfaced —
// the count of prompt tokens served from the provider's cache rather than processed fresh.
message PromptTokensDetails {
  optional uint32 cached_tokens = 1;
}

// The canonical error envelope returned by every endpoint:  {"error":{"message":...}}.
message ErrorResponse {
  ErrorBody error = 1;
}

message ErrorBody {
  string message = 1;
  // Present on some dialects; absent on the llmleaf core envelope.
  optional string type = 2;
  optional string code = 3;
}

// ----------------------------------------------------------------------------
// Chat completions  (POST /v1/chat/completions)
// ----------------------------------------------------------------------------

enum Role {
  ROLE_UNSPECIFIED = 0;
  SYSTEM = 1;
  USER = 2;
  ASSISTANT = 3;
  TOOL = 4;
}

enum FinishReason {
  FINISH_REASON_UNSPECIFIED = 0;
  STOP = 1;
  LENGTH = 2;
  TOOL_CALLS = 3;
  CONTENT_FILTER = 4;
}

// A single content part for multimodal messages:
//   {"type":"text","text":"..."}
//   {"type":"image_url","image_url":{"url":"...","detail":"auto"}}
message ContentPart {
  oneof part {
    TextPart text = 1;
    ImageUrlPart image_url = 2;
  }
}

message TextPart {
  string text = 1;
}

message ImageUrlPart {
  string url = 1;
  optional string detail = 2; // "auto" | "low" | "high"
}

message ContentParts {
  repeated ContentPart items = 1;
}

// A function the model called.  `arguments` is a JSON-encoded string (OpenAI shape).
message FunctionCall {
  string name = 1;
  string arguments = 2;
}

message ToolCall {
  string id = 1;
  string type = 2; // always "function" today
  FunctionCall function = 3;
}

// Incremental tool-call fragment on a streaming delta; fields arrive piecemeal.
message FunctionCallDelta {
  optional string name = 1;
  optional string arguments = 2;
}

message ToolCallDelta {
  uint32 index = 1;
  optional string id = 2;
  optional string type = 3;
  optional FunctionCallDelta function = 4;
}

// One structured reasoning ("thinking") block, OpenRouter-shaped
// (`message.reasoning_details[]` / `delta.reasoning_details[]`). It expresses both *open* reasoning
// (visible text, optionally signed) and *hidden* reasoning (an encrypted/redacted blob the provider
// returns in place of the text). `type` is the wire discriminator and selects which field is set:
//   "reasoning.text"      -> text (+ optional signature)   — OPEN  (visible reasoning)
//   "reasoning.summary"   -> summary                        — OPEN  (a summarised view)
//   "reasoning.encrypted" -> data                           — HIDDEN (redacted / opaque)
// `signature` and `data` are opaque to the client and MUST be echoed back verbatim in the next
// request's reasoning_details to continue a signed/encrypted reasoning turn (the upstream rejects an
// altered or dropped block — e.g. before a tool call). `format` tags the provider encoding when known.
message ReasoningDetail {
  string type = 1;
  optional string text = 2;      // "reasoning.text"
  optional string summary = 3;   // "reasoning.summary"
  optional string data = 4;      // "reasoning.encrypted" (hidden)
  optional string signature = 5; // opaque, replayed verbatim
  optional string id = 6;
  optional string format = 7;    // e.g. "anthropic-claude-v1"
  optional uint32 index = 8;
}

message ChatMessage {
  Role role = 1;
  // Wire `content` is either a plain string or an array of content parts.
  oneof content {
    string text = 2;
    ContentParts parts = 3;
  }
  optional string name = 4;
  repeated ToolCall tool_calls = 5;
  optional string tool_call_id = 6; // set when role == TOOL
  // Reasoning the assistant emitted (OpenRouter surface). `reasoning` is the flat open text; the
  // structured `reasoning_details` additionally carries signatures and hidden/encrypted blocks. Send
  // `reasoning_details` back verbatim on the next turn to preserve signed reasoning (see ReasoningDetail).
  optional string reasoning = 7;
  repeated ReasoningDetail reasoning_details = 8;
}

// A function the model MAY call.  `parameters` is a raw JSON Schema string.
message FunctionDef {
  string name = 1;
  optional string description = 2;
  optional string parameters = 3; // raw JSON object
}

message ToolDef {
  string type = 1; // "function"
  FunctionDef function = 2;
}

// tool_choice is either a mode string ("auto"|"none"|"required") or an object
// pinning a specific function: {"type":"function","function":{"name":"..."}}.
message ToolChoice {
  oneof choice {
    string mode = 1;
    NamedToolChoice named = 2;
  }
}

message NamedToolChoice {
  string type = 1; // "function"
  FunctionName function = 2;
}

message FunctionName {
  string name = 1;
}

// response_format: {"type":"text"|"json_object"|"json_schema", "json_schema": {...}}
message ResponseFormat {
  string type = 1;
  optional string json_schema = 2; // raw JSON object when type == "json_schema"
}

message ChatRequest {
  string model = 1;
  repeated ChatMessage messages = 2;
  optional bool stream = 3;
  optional float temperature = 4;
  optional float top_p = 5;
  optional uint32 max_tokens = 6;            // legacy name
  optional uint32 max_completion_tokens = 7; // modern name (takes precedence)
  repeated string stop = 8;                  // wire accepts string or array
  optional uint32 n = 9;
  optional int64 seed = 10;
  optional float frequency_penalty = 11;
  optional float presence_penalty = 12;
  repeated ToolDef tools = 13;
  optional ToolChoice tool_choice = 14;
  optional ResponseFormat response_format = 15;
  optional string reasoning_effort = 16; // "low" | "medium" | "high"
  // Dialect-specific passthrough, spliced verbatim into the request body (P7).
  optional string extra = 17; // raw JSON object
}

message Choice {
  uint32 index = 1;
  ChatMessage message = 2;
  optional FinishReason finish_reason = 3;
}

message ChatResponse {
  string id = 1;
  string object = 2; // "chat.completion"
  int64 created = 3; // unix seconds
  string model = 4;
  repeated Choice choices = 5;
  Usage usage = 6;
}

// Streaming SSE frame: `data: <ChatCompletionChunk JSON>\n\n`, terminated by
// the sentinel line `data: [DONE]`.
message Delta {
  optional Role role = 1;       // first chunk only
  optional string content = 2;  // incremental text
  repeated ToolCallDelta tool_calls = 3;
  // Incremental reasoning. `reasoning` is open text streamed token-by-token; `reasoning_details`
  // carries structured open/hidden blocks (and their signatures) as they arrive (see ReasoningDetail).
  optional string reasoning = 4;
  repeated ReasoningDetail reasoning_details = 5;
}

message ChunkChoice {
  uint32 index = 1;
  Delta delta = 2;
  optional FinishReason finish_reason = 3;
}

message ChatCompletionChunk {
  string id = 1;
  string object = 2; // "chat.completion.chunk"
  int64 created = 3;
  string model = 4;
  repeated ChunkChoice choices = 5;
  optional Usage usage = 6; // terminal chunk only
}

// ----------------------------------------------------------------------------
// Responses  (POST /v1/responses) — the OpenAI Responses dialect
// ----------------------------------------------------------------------------
//
// llmleaf serves this dialect statelessly: `store` is accepted but always answered
// `false`, `previous_response_id` is rejected (400), and `GET /v1/responses/{id}`
// is an explained 404 by design — so the SDKs expose no retrieval call. Dialect
// vocabulary that collides with existing enum value names at package scope
// (status "completed"/"in_progress"/…, roles incl. "developer") stays a plain
// wire string here rather than an enum.

// One item of the request `input` array or the response `output` array. The wire
// discriminator is `"type"` and selects which field is set:
//   "message"              -> message   (also the shape of a role-keyed item with no type)
//   "function_call"        -> function_call
//   "function_call_output" -> function_call_output
//   "reasoning"            -> reasoning
message ResponseItem {
  oneof item {
    ResponseMessageItem message = 1;
    ResponseFunctionCallItem function_call = 2;
    ResponseFunctionCallOutputItem function_call_output = 3;
    ResponseReasoningItem reasoning = 4;
  }
}

message ResponseItemList {
  repeated ResponseItem items = 1;
}

// A conversation message item. On input, `role` is "user" | "system" | "developer" |
// "assistant" and `content` is a bare string or input parts; on output, role is
// "assistant", content is output_text parts, and `status`/`id` are set.
message ResponseMessageItem {
  optional string id = 1;
  string role = 2;
  oneof content {
    string text = 3;
    ResponseContentParts parts = 4;
  }
  optional string status = 5; // output only: "in_progress" | "completed"
}

// One content part; the `"type"` wire token matches the set field's name:
//   {"type":"input_text","text":...}
//   {"type":"input_image","image_url":"<url>","detail":...}   (image_url is a STRING here)
//   {"type":"output_text","text":...,"annotations":[]}
message ResponseContentPart {
  oneof part {
    ResponseTextPart input_text = 1;
    ResponseInputImagePart input_image = 2;
    ResponseTextPart output_text = 3;
  }
}

message ResponseContentParts {
  repeated ResponseContentPart items = 1;
}

message ResponseTextPart {
  string text = 1;
}

message ResponseInputImagePart {
  string image_url = 1;       // plain string, NOT the chat dialect's nested object
  optional string detail = 2; // "auto" | "low" | "high"
}

// A function call the model made. `call_id` pairs it with its function_call_output;
// `arguments` is the raw JSON string exactly as emitted.
message ResponseFunctionCallItem {
  optional string id = 1;
  string call_id = 2;
  string name = 3;
  string arguments = 4;
  optional string status = 5;
}

// The caller's answer to a function call, replayed on the next turn.
message ResponseFunctionCallOutputItem {
  optional string id = 1;
  string call_id = 2;
  string output = 3;
}

// A reasoning ("thinking") item. `summary` entries are {"type":"summary_text","text"},
// `content` entries are {"type":"reasoning_text","text"} — the entry's list decides its
// wire `type` token. `encrypted_content` is opaque and MUST be echoed back verbatim in
// the next request's input to continue an encrypted reasoning turn (llmleaf requests it
// from Responses-speaking upstreams so multi-turn reasoning survives statelessly).
message ResponseReasoningItem {
  optional string id = 1;
  repeated ResponseReasoningText summary = 2;
  repeated ResponseReasoningText content = 3;
  optional string encrypted_content = 4;
}

message ResponseReasoningText {
  string text = 1;
}

// A tool the model MAY call — FLAT in this dialect (`type`/`name`/`parameters` at the
// top level, no nested `function` object). `parameters` is a raw JSON Schema string.
message ResponsesToolDef {
  string type = 1; // "function"
  string name = 2;
  optional string description = 3;
  optional string parameters = 4; // raw JSON object
  optional bool strict = 5;       // defaults TRUE upstream; llmleaf's own edge pins false
}

// tool_choice: a mode string ("auto"|"none"|"required") or the FLAT named object
// {"type":"function","name":"..."} (no nested `function`, unlike the chat dialect).
message ResponsesToolChoice {
  oneof choice {
    string mode = 1;
    ResponsesNamedToolChoice named = 2;
  }
}

message ResponsesNamedToolChoice {
  string type = 1; // "function"
  string name = 2;
}

// reasoning: {"effort":"minimal"|"low"|"medium"|"high"|..., "summary":...}
message ResponsesReasoning {
  optional string effort = 1;
  optional string summary = 2;
}

message ResponsesRequest {
  string model = 1;
  // Wire `input` is either a bare string (one user message) or an array of items.
  oneof input {
    string text = 2;
    ResponseItemList items = 3;
  }
  optional string instructions = 4; // becomes a leading system message
  optional bool stream = 5;
  optional float temperature = 6;
  optional float top_p = 7;
  optional uint32 max_output_tokens = 8;
  repeated ResponsesToolDef tools = 9;
  optional ResponsesToolChoice tool_choice = 10;
  optional ResponsesReasoning reasoning = 11;
  // Accepted but always answered `false` — llmleaf stores nothing.
  optional bool store = 12;
  // Dialect-specific passthrough, spliced verbatim into the request body (P7).
  optional string extra = 13; // raw JSON object
}

// Token accounting in the Responses dialect's own names (`input_tokens`/`output_tokens`,
// not the chat dialect's `prompt_tokens`/`completion_tokens`).
message ResponsesUsage {
  uint32 input_tokens = 1;
  optional ResponsesInputTokensDetails input_tokens_details = 2;
  uint32 output_tokens = 3;
  optional ResponsesOutputTokensDetails output_tokens_details = 4;
  uint32 total_tokens = 5;
}

message ResponsesInputTokensDetails {
  optional uint32 cached_tokens = 1;
}

message ResponsesOutputTokensDetails {
  optional uint32 reasoning_tokens = 1;
}

// status "incomplete" refinement: "max_output_tokens" | "content_filter".
message ResponsesIncompleteDetails {
  string reason = 1;
}

// The response object (`"object":"response"`), also the snapshot carried by the
// `response.created` / `response.in_progress` / `response.completed` stream events.
// Fields the wire echoes but SDKs don't need typed (tools, tool_choice, truncation,
// parallel_tool_calls, …) are simply ignored on decode — JSON tolerates unknown keys.
message ResponsesResponse {
  string id = 1;
  string object = 2;  // "response"
  int64 created_at = 3; // unix seconds
  string status = 4;  // "completed" | "in_progress" | "incomplete" | "failed"
  optional ResponsesIncompleteDetails incomplete_details = 5;
  optional ErrorBody error = 6;
  string model = 7;
  repeated ResponseItem output = 8;
  optional ResponsesUsage usage = 9; // null on in-flight snapshots
  optional bool store = 10;          // llmleaf always answers false
  optional string instructions = 11;
  optional uint32 max_output_tokens = 12;
  optional float temperature = 13;
  optional float top_p = 14;
  optional ResponsesReasoning reasoning = 15;
}

// One streaming SSE event. Unlike chat streaming there is NO `data: [DONE]` sentinel:
// each frame is `event: <type>` + `data: <json>` where the JSON is self-describing via
// `type`, and the stream ends after the terminal `response.completed` /
// `response.incomplete` / `response.failed` event. This is a flat superset of every
// event's fields — `type` says which ones are meaningful; SDKs MUST ignore event types
// they don't recognise (the dialect grows by adding types).
message ResponsesStreamEvent {
  string type = 1; // "response.created", "response.output_text.delta", ...
  uint64 sequence_number = 2;
  optional ResponsesResponse response = 3; // response.created/in_progress/completed/incomplete/failed
  optional uint32 output_index = 4;
  optional string item_id = 5;
  optional uint32 content_index = 6;
  optional ResponseItem item = 7;          // response.output_item.added/done
  optional ResponseContentPart part = 8;   // response.content_part.added/done
  optional string delta = 9;               // *.delta events (text / reasoning / arguments)
  optional string text = 10;               // response.output_text.done / reasoning_text.done
  optional string arguments = 11;          // response.function_call_arguments.done
  optional string message = 12;            // "error" event
}

// ----------------------------------------------------------------------------
// Embeddings  (POST /v1/embeddings)
// ----------------------------------------------------------------------------

message EmbeddingRequest {
  string model = 1;
  repeated string input = 2; // wire accepts string or array of strings
  optional uint32 dimensions = 3;
  optional string encoding_format = 4; // "float" | "base64"
  optional string extra = 5;           // raw JSON object passthrough
}

message Embedding {
  string object = 1; // "embedding"
  uint32 index = 2;
  repeated float embedding = 3; // present when encoding_format == "float"
  // When encoding_format == "base64" the wire carries a base64 string instead of
  // the float array; transports decode it into `embedding`.
}

message EmbeddingResponse {
  string object = 1; // "list"
  repeated Embedding data = 2;
  string model = 3;
  Usage usage = 4;
}

// ----------------------------------------------------------------------------
// Audio — text to speech  (POST /v1/audio/speech  ->  raw audio bytes)
//         voice catalog    (GET  /v1/audio/voices)
// ----------------------------------------------------------------------------

message SpeechRequest {
  string model = 1;
  string input = 2;
  string voice = 3;
  optional string response_format = 4; // mp3|opus|aac|flac|wav|pcm
  optional float speed = 5;
  optional string extra = 6; // raw JSON object passthrough
}

// SpeechRequest returns raw audio bytes (no JSON envelope); the Content-Type
// reflects response_format (mp3 -> audio/mpeg, wav -> audio/wav, ...).

message Voice {
  string id = 1; // value to put in SpeechRequest.voice
  optional string name = 2;
  repeated string languages = 3; // BCP-47 tags
}

message VoicesResponse {
  string model = 1;
  repeated Voice voices = 2;
}

// ----------------------------------------------------------------------------
// Audio — speech to text  (POST /v1/audio/transcriptions, multipart/form-data)
// ----------------------------------------------------------------------------

// The audio file itself is sent as the multipart `file` part, NOT in this message;
// these are the accompanying form fields.
message TranscriptionRequest {
  string model = 1;
  optional string language = 2;        // ISO-639-1 hint
  optional string prompt = 3;          // decoding bias
  optional string response_format = 4; // json|text|verbose_json|srt|vtt
  optional float temperature = 5;
}

// For response_format json/verbose_json. text/srt/vtt return a plain-text body.
message TranscriptionResponse {
  string text = 1;
  optional string task = 2;     // "transcribe" (verbose_json)
  optional string language = 3;
  optional float duration = 4;
  optional Usage usage = 5;
}

// ----------------------------------------------------------------------------
// Model catalog  (GET /v1/models)  — OpenRouter-shaped
// ----------------------------------------------------------------------------

message Architecture {
  repeated string input_modalities = 1;
  repeated string output_modalities = 2;
  optional string modality = 3; // "text->text" | "text->audio" | ...
  string tokenizer = 4;
  optional string instruct_type = 5;
}

message Pricing {
  string prompt = 1;     // USD per token, decimal string
  string completion = 2;
}

message TopProvider {
  optional uint32 context_length = 1;
  optional uint32 max_completion_tokens = 2;
  bool is_moderated = 3;
  optional uint32 max_thinking_tokens = 4; // llmleaf extension
}

// Admin-only fallback-chain entry (present only with a valid x-admin-token).
message ModelEndpoint {
  string provider = 1;
  string model = 2;
  bool down = 3;
  string source = 4; // "route" | "prefix"
}

message ModelEntry {
  string id = 1;
  string canonical_slug = 2;
  string name = 3;
  int64 created = 4;
  string description = 5;
  optional uint32 context_length = 6;
  Architecture architecture = 7;
  optional Pricing pricing = 8;
  TopProvider top_provider = 9;
  repeated string supported_parameters = 10;
  repeated string unsupported_parameters = 11;
  optional string default_parameters = 12; // raw JSON object
  repeated ModelEndpoint endpoints = 13;    // admin-only
}

message ListModelsResponse {
  repeated ModelEntry data = 1;
}

// ----------------------------------------------------------------------------
// Batches  (POST /v1/batches, GET /v1/batches/{id}, .../cancel, .../results)
// ----------------------------------------------------------------------------

enum BatchStatus {
  BATCH_STATUS_UNSPECIFIED = 0;
  VALIDATING = 1;
  IN_PROGRESS = 2;
  FINALIZING = 3;
  COMPLETED = 4;
  FAILED = 5;
  EXPIRED = 6;
  CANCELING = 7;
  CANCELED = 8;
}

message BatchRequestItem {
  string custom_id = 1;
  ChatRequest body = 2;
}

message BatchCreateRequest {
  repeated BatchRequestItem requests = 1;
}

message BatchCounts {
  uint64 total = 1;
  uint64 processing = 2;
  uint64 succeeded = 3;
  uint64 errored = 4;
  uint64 canceled = 5;
  uint64 expired = 6;
}

message BatchHandle {
  string id = 1;
  BatchStatus status = 2;
  BatchCounts counts = 3;
  optional int64 created_at = 4;
  optional int64 expires_at = 5;
  optional int64 ended_at = 6;
  optional string endpoint = 7; // e.g. "/v1/chat/completions"
}

// One line of the JSONL results stream (GET /v1/batches/{id}/results).
message BatchResultLine {
  string custom_id = 1;
  optional BatchResponse response = 2;
  optional BatchError error = 3;
}

message BatchResponse {
  uint32 status_code = 1;
  ChatResponse body = 2;
}

message BatchError {
  string code = 1;
  string message = 2;
}
