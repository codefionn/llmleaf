name: CI

# Pull-request verification only. Pushes to `main` and `v*` tags are handled by
# release.yml, which runs the same lint + test gate before it publishes.
on:
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: lint · test · image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Runs the lint, test and image targets in one bake invocation so the
      # shared stages (chef → planner → deps → source) are built exactly once.
      # The image is built but not pushed — this is the verification pipeline.
      - name: Lint, test and build image
        uses: docker/bake-action@v6
        with:
          targets: |
            lint
            test
            image
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
